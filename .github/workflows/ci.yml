name: GitHub pull request workflow

on:
  pull_request:
    branches:
      - main

jobs:
  demo-jobs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Display message
        run: echo "This is a pull request workflow triggered by a pull request to the main branch."

      - name: Show date
        run: date

      - name: Display current directory
        run: pwd